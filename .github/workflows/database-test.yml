name: Database Tests

on:
  workflow_call:

jobs:
  db-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENAI_API_KEY: dummy
      SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: dummy
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: dummy
      AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET: dummy
      S3_HOST: localhost
      S3_REGION: ap-northeast-1
      S3_ACCESS_KEY: dummy
      S3_SECRET_KEY: dummy

    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Run database tests
        run: supabase test db

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop --no-backup
