name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - run: npm install
      - run: npm test

  database-test:
    uses: ./.github/workflows/database-test.yml
